<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Our Little Cards</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: linear-gradient(145deg, #f5f0eb 0%, #e8dfd7 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
        }
        h1 {
            color: #b76e3a;
        }
        .badge {
            background: #1e2a2e;
            color: #d4af37;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="badge">✦ OUR LITTLE CARDS ✦</div>
        <h1>Deluxe Edition</h1>
        <p>Коллекция из 9 карточек</p>
        <p>✨ «Мой хлебный мякиш x My Princess» ✨</p>
    </div>
</body>
</html>
